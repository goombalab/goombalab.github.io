<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIAH-1 Results</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: transparent;
      padding: 1rem 1.25rem 0.75rem;
      color: #1e293b;
    }
    .row {
      display: flex;
      gap: 1.5rem;
      align-items: stretch;
    }
    .panel {
      flex: 1;
      min-width: 0;
      position: relative;
    }
    .chart-box {
      position: relative;
      height: 400px;
    }
    .footer-note {
      text-align: center;
      font-size: 0.71rem;
      color: #94a3b8;
      margin-top: 0.55rem;
      font-style: italic;
      letter-spacing: 0.015em;
    }
  </style>
</head>
<body>
  <div class="row">
    <div class="panel">
      <div class="chart-box"><canvas id="canvas-400"></canvas></div>
    </div>
    <div class="panel">
      <div class="chart-box"><canvas id="canvas-800"></canvas></div>
    </div>
  </div>
  <p class="footer-note">Dashed line marks the training context length &middot; Hover any point for exact accuracy</p>

  <script>
    const colorMap = {
      "Transformer": "orange",
      "FoX":         "sienna",
      "GLA":         "green",
      "SWA":         "teal",
      "GSA":         "red",
      "Mamba2":      "#2ECC71",
      "Mamba-2":     "#2ECC71",
      "GDN":         "purple",
      "Raven":     "dodgerblue",
    };

    const RAW = {
      "400": {
        labels: ["1k", "2k", "4k", "8k", "16k", "32k"],
        models: {
          "Transformer": [100.0, 100.0,  0.0,  0.0,  0.0,  0.0],
          "FoX":         [100.0, 100.0, 32.2,  8.0,  4.2,  0.0],
          "GLA":         [ 74.6,  25.1,  8.2,  2.2,  0.0,  0.0],
          "SWA":         [ 29.8,  11.0,  6.2,  3.4,  1.2,  0.0],
          "GSA":         [ 99.2,  97.1, 90.0, 67.4, 29.6, 11.0],
          "Mamba2":      [ 99.2,  95.6, 52.2, 12.8,  5.4,  2.8],
          "GDN":         [ 99.2, 100.0, 99.8, 92.0, 41.8, 22.1],
          "Raven":     [ 99.8, 100.0, 99.8, 99.8, 99.4, 91.4],
        },
      },
      "800": {
        labels: ["2k", "4k", "8k", "16k", "32k", "64k"],
        models: {
          "Transformer": [ 92.4,  90.8,  0.0,  0.0,  0.0,  0.0],
          "FoX":         [100.0, 100.0, 99.0, 28.6, 12.4,  0.0],
          "GLA":         [100.0,  94.2, 29.4,  3.6,  0.0,  0.0],
          "SWA":         [ 11.0,   6.2,  3.4,  1.2,  0.6,  0.0],
          "GSA":         [100.0, 100.0, 99.8, 97.6, 64.0,  0.0],
          "GDN":         [100.0, 100.0,100.0,100.0, 94.8, 45.2],
          "Mamba-2":     [ 99.8,  63.4, 13.6,  1.8,  0.8,  0.6],
          "Raven":     [ 99.8, 100.0, 99.8, 99.2, 98.2, 91.0],
        },
      },
    };

    function buildDatasets(models) {
      return Object.entries(models).map(([name, vals]) => {
        const px = name === "Raven";
        return {
          label:            name,
          data:             vals,
          borderColor:      colorMap[name] || "#999",
          backgroundColor:  colorMap[name] || "#999",
          borderWidth:      2.5,
          pointRadius:      6,
          pointHoverRadius: 11,
          pointBorderWidth: 1.5,
          pointBorderColor: "#fff",
          tension:          0.12,
          order:            px ? 0 : 1,
        };
      });
    }

    function makeOptions(title) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        interaction: { mode: 'point', intersect: true },
        plugins: {
          title: {
            display: true,
            text: title,
            font: { family: "Georgia, serif", size: 13.5, weight: "bold" },
            color: "#1e293b",
            padding: { bottom: 12 },
          },
          legend: {
            display: true,
            position: 'bottom',
            labels: {
              font:          { family: "Georgia, serif", size: 11.5 },
              color:         "#334155",
              usePointStyle: true,
              pointStyle:    'circle',
              padding:       14,
              boxWidth:      9,
            },
          },
          tooltip: {
            enabled: true,
            backgroundColor: "#0f172a",
            titleColor:      "#f1f5f9",
            bodyColor:       "#94a3b8",
            borderColor:     "rgba(255,255,255,0.08)",
            borderWidth:     1,
            padding:         { x: 12, y: 9 },
            cornerRadius:    9,
            titleFont: { family: "Georgia, serif", size: 13, weight: "bold" },
            bodyFont:  { family: "Georgia, serif", size: 13 },
            callbacks: {
              title: (items) => items[0].dataset.label,
              label: (item)  => `  ${item.parsed.y.toFixed(1)}%  at ${item.label}`,
              labelColor: (item) => ({
                borderColor:     colorMap[item.dataset.label] || "#94a3b8",
                backgroundColor: colorMap[item.dataset.label] || "#94a3b8",
                borderWidth: 2,
                borderRadius: 3,
              }),
            },
            displayColors: true,
          },
          annotation: {
            annotations: {
              trainingCtx: {
                type:        'line',
                xMin:        1,
                xMax:        1,
                borderColor: 'rgba(30,30,30,0.5)',
                borderWidth: 1.8,
                borderDash:  [7, 5],
                label: {
                  display:         true,
                  content:         'Training context',
                  position:        'start',
                  yAdjust:         -12,
                  font:            { family: "Georgia, serif", size: 9.5, style: "italic" },
                  color:           "#475569",
                  backgroundColor: "rgba(255,255,255,0.88)",
                  padding:         { x: 5, y: 3 },
                  borderRadius:    4,
                },
              },
            },
          },
        },
        scales: {
          x: {
            grid:   { color: "rgba(0,0,0,0.055)", lineWidth: 1 },
            border: { display: false },
            ticks:  { font: { family: "Georgia, serif", size: 12 }, color: "#64748b" },
            title: {
              display: true,
              text: "Sequence Length",
              font:  { family: "Georgia, serif", size: 12 },
              color: "#64748b",
              padding: { top: 4 },
            },
          },
          y: {
            min: -5,
            max: 110,
            grid:   { color: "rgba(0,0,0,0.055)", lineWidth: 1 },
            border: { display: false },
            ticks: {
              stepSize: 20,
              font:     { family: "Georgia, serif", size: 12 },
              color:    "#64748b",
              callback: v => (v < 0 || v > 100) ? "" : v + "%",
            },
            title: {
              display: true,
              text: "Accuracy (%)",
              font:  { family: "Georgia, serif", size: 12 },
              color: "#64748b",
              padding: { bottom: 4 },
            },
          },
        },
      };
    }

    new Chart(document.getElementById("canvas-400"), {
      type: "line",
      data: { labels: RAW["400"].labels, datasets: buildDatasets(RAW["400"].models) },
      options: makeOptions("NIAH-1  ·  ~400M / 15B tokens"),
    });

    new Chart(document.getElementById("canvas-800"), {
      type: "line",
      data: { labels: RAW["800"].labels, datasets: buildDatasets(RAW["800"].models) },
      options: makeOptions("NIAH-1  ·  ~800M / 32B tokens"),
    });
  </script>
</body>
</html>
