<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raven Memory Dynamics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      background: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1e293b;
      padding: 0.4rem 0.25rem 0.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }
    .head-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #475569;
    }
    .tok-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .tok-badge {
      padding: 0.12rem 0.55rem;
      border-radius: 5px;
      font-family: 'SFMono-Regular','Consolas',monospace;
      font-weight: 700;
      font-size: 0.75rem;
      min-width: 4rem;
      text-align: center;
    }
    .tok-badge.needle { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
    .tok-badge.ctx    { background:#f0fdf4; color:#15803d; border:1px solid #86efac; }
    .tok-badge.gen    { background:#fff0f0; color:#c0392b; border:1px solid #f87171; font-weight:900; }

    /* Memory box */
    .box-outer {
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      background: #e8ecf1;
      box-shadow: inset 0 1px 4px rgba(15,23,42,0.07);
    }
    canvas { display: block; width: 100%; height: auto; }

    .axis-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #94a3b8;
      margin-top: 0.15rem;
      padding: 0 2px;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.45rem;
    }
    input[type=range] { accent-color: #3b82f6; }
    #scrubber { flex: 1; height: 3px; cursor: pointer; }
    #step-lbl { font-size: 0.66rem; color: #94a3b8; white-space: nowrap; min-width: 46px; text-align: right; flex-shrink: 0; }
    #play-btn {
      padding: 0.2rem 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #f8fafc;
      color: #475569;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    #play-btn:hover { background: #e2e8f0; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 1.1rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .leg { display: flex; align-items: center; gap: 0.3rem; font-size: 0.69rem; color: #475569; }
    .dot { width: 20px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Token ticker */
    .ticker-wrap {
      margin-top: 0.55rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.4rem 0.65rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2px 0;
      align-items: center;
      line-height: 1.6;
    }
    .phase-label {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      padding: 1px 5px 1px 2px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .phase-label.prompt  { color: #0f172a; }
    .phase-label.raven { color: #0f172a; }
    /* force Raven label to new line */
    .line-break { width: 100%; height: 0; flex-shrink: 0; }

    .tok {
      display: inline-block;
      padding: 1px 3px;
      border-radius: 3px;
      font-size: 0.64rem;
      font-family: 'SFMono-Regular','Consolas',monospace;
      color: #94a3b8;
      border: 1px solid transparent;
      white-space: pre;
    }
    .tok.cur-n  { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; font-weight:700; }
    .tok.cur-c  { background:#dcfce7; color:#15803d; border-color:#86efac; font-weight:700; }
    .tok.done-n { background:#fef2f2; color:#ef4444; }
    .tok.done-c { background:#f0fdf4; color:#22c55e; }
    /* Generation output tokens — always show red tones */
    .tok.gen        { color: #f87171; }
    .tok.gen.cur-n  { background:#fee2e2; color:#c0392b; border-color:#f87171; font-weight:900; font-size:0.72rem; }
    .tok.gen.done-n { background:#fff0f0; color:#e74c3c; font-weight:700; }
  </style>
</head>
<body>

<div class="header">
  <span class="head-label" id="head-label"></span>
  <div class="tok-info">
    <span class="ctrl-lbl">t =</span>
    <span id="step-lbl">1 / 65</span>
    <span class="ctrl-lbl">·</span>
    <span class="tok-badge ctx" id="tok-badge">&nbsp;</span>
  </div>
</div>

<div class="box-outer">
  <canvas id="canvas"></canvas>
</div>

<div class="axis-row">
  <span>← retrieval slots</span>
  <span>shared</span>
  <span>context slots →</span>
</div>

<div class="controls">
  <button id="play-btn">▶ Play</button>
  <span id="step-lbl-btn" style="font-size:0.66rem;color:#94a3b8;">t = 1 / 65</span>
</div>

<div class="legend">
  <div class="leg"><div class="dot" style="background:linear-gradient(90deg,#e8ecf1,#e01010)"></div>Retrieval slots</div>
  <div class="leg"><div class="dot" style="background:linear-gradient(90deg,#e8ecf1,#1a8fe0)"></div>Shared slots</div>
  <div class="leg"><div class="dot" style="background:linear-gradient(90deg,#e8ecf1,#12b554)"></div>Context slots</div>
  <div class="leg"><div class="dot" style="background:#e8ecf1;border:1px solid #cbd5e1"></div>Unwritten</div>
</div>

<div class="ticker-wrap" id="ticker"></div>

  if (tot > maxVal) maxVal = tot;
}

// ── Colors ──
const GRAY = [232, 236, 241];
const BASE  = [GRAY, GRAY, GRAY, GRAY];
const FULL  = [
  [175, 182, 193],  // unused
  [195,  60,  60],  // red   — softer #c33c3c
  [ 18, 181,  84],  // green — vivid #12b554
  [ 26, 143, 224],  // blue  — vivid #1a8fe0
];

function lerpC(base, full, t) {
  return [
    Math.round(base[0] + (full[0]-base[0]) * t),
    Math.round(base[1] + (full[1]-base[1]) * t),
    Math.round(base[2] + (full[2]-base[2]) * t),
  ];
}

const imgData = ctx.createImageData(CW, CH);
const px = imgData.data;

function drawState(t) {
  const vN = framesN[t];
  const vO = framesO[t];
  for (let si = 0; si < N; si++) {
    const n = vN[si], o = vO[si], total = n + o;
    const bright = total > 0 ? Math.min(1, Math.pow(total / maxVal, 0.22)) : 0;

    // Slot type based on what has ACTUALLY written to this slot up to time t
    let stype;
    if (total < 0.5)           stype = 0;  // unwritten → gray
    else if (n / total > 0.85) stype = 1;  // red   — needle-dominant  (~10% of slots)
    else if (n / total < 0.42) stype = 2;  // green — context-dominant (~50% of slots)
    else                        stype = 3;  // blue  — shared           (~40% of slots)

    const [r, g, b] = bright > 0 ? lerpC(GRAY, FULL[stype], bright) : GRAY;
    const x0 = si * PX;
    for (let py = 0; py < CH; py++) {
      for (let dx = 0; dx < PX; dx++) {
        const idx = (py * CW + x0 + dx) * 4;
        px[idx]=r; px[idx+1]=g; px[idx+2]=b; px[idx+3]=255;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ── Custom display text (overrides raw model tokens for readability) ──
// 59 prompt tokens + 6 generation tokens = 65 total; routing data unchanged.
const DISPLAY_TOKENS = [
  '⟨s⟩',                                            // 0
  ' SS', 'Ms',                                       // 1–2
  ' often',                                          // 3
  ' strug', 'gle',                                   // 4–5
  ' on',                                             // 6
  ' rec', 'all',                                     // 7–8
  '-',                                               // 9
  'heavy',                                           // 10
  ' tasks',                                          // 11
  ' when',                                           // 12
  ' mem', 'ory',                                     // 13–14
  ' up', 'dates',                                    // 15–16
  ' stay',                                           // 17
  ' dense',                                          // 18
  ' and',                                            // 19
  ' uni', 'form',                                    // 20–21
  ' dur', 'ing',                                     // 22–23
  ' train', 'ing',                                   // 24–25
  '.',                                               // 26
  ' The',                                            // 27
  ' pass', 'word',                                   // 28–29
  ' is',                                             // 30
  ' Re', 'call', 'SS', 'M',                          // 31–34
  '13', '78',                                        // 35–36
  '.',                                               // 37
  ' Ro', 'ut', 'ing',                                // 38–40
  ' stores',                                         // 41
  ' it',                                             // 42
  ' in',                                             // 43
  ' ded', 'ic', 'ated',                              // 44–46
  ' slots',                                          // 47
  ' for',                                            // 48
  ' rec', 'all',                                     // 49–50
  '.',                                               // 51
  ' Now',                                            // 52
  ' tell',                                           // 53
  ' me',                                             // 54
  ' the',                                            // 55
  ' pass', 'word',                                   // 56–57
  ' =',                                              // 58
  // Generation tokens:
  ' Recall', 'SSM', ' 1', '3', '7', '8',            // 59–64
];

// ── Build token ticker ──
// Use display-aligned needle indices (Re·call·SS·M·13·78 at positions 31–36)
// so the ticker highlights exactly the password tokens in the custom text.
// Memory slot coloring is unaffected (it uses DATA.token_types, not needleSet).
const needleSet = new Set([28, 29, 31, 32, 33, 34, 35, 36, 56, 57, 59, 60, 61, 62, 63, 64]);
const ticker = document.getElementById('ticker');

// "Prompt:" label
const pLabel = document.createElement('span');
pLabel.className = 'phase-label prompt';
pLabel.textContent = 'Prompt:';
ticker.appendChild(pLabel);

DATA.tokens.forEach((tok, i) => {
  // Insert line-break + "Raven:" label before generation tokens
  if (i === GEN_START) {
    const brk = document.createElement('div');
    brk.className = 'line-break';
    ticker.appendChild(brk);
    const phLabel = document.createElement('span');
    phLabel.className = 'phase-label raven';
    phLabel.textContent = 'Raven:';
    ticker.appendChild(phLabel);
  }
  const sp = document.createElement('span');
  const isGen = i >= GEN_START;
  sp.className = 'tok' + (isGen ? ' gen' : '');
  sp.textContent = DISPLAY_TOKENS[i];
  sp.id = 'tk' + i;
  ticker.appendChild(sp);
});

// ── Render ──
let step = 0;

function syncFrameHeight(force) {
  try {
    if (playing && !force) return;
    const frame = window.frameElement;
    if (!frame) return;
    const h = Math.ceil(Math.max(
      document.body ? document.body.scrollHeight : 0,
      document.documentElement ? document.documentElement.scrollHeight : 0
    ));
    if (h <= 0) return;

    const current = Math.ceil(frame.getBoundingClientRect().height || parseFloat(frame.style.height) || 0);
    if (Math.abs(h - current) > 1) frame.style.height = h + 'px';
  } catch (_) {}
}

function render() {
  drawState(step);

  const tok  = DATA.tokens[step];
  const isN  = needleSet.has(step);
  const isGen = step >= GEN_START;
  const badge = document.getElementById('tok-badge');
  badge.textContent = DISPLAY_TOKENS[step];
  badge.className = 'tok-badge ' + (isGen ? 'gen' : isN ? 'needle' : 'ctx');

  const _lbl = 't = ' + (step+1) + ' / ' + T;
  document.getElementById('step-lbl').textContent = (step+1) + ' / ' + T;
  document.getElementById('step-lbl-btn').textContent = _lbl;

  for (let i = 0; i < T; i++) {
    const el = document.getElementById('tk'+i);
    if (!el) continue;
    const n   = needleSet.has(i);
    const gen = i >= GEN_START;
    if (i === step)       el.className = 'tok' + (gen?' gen':'') + (n ? ' cur-n' : ' cur-c');
    else if (i < step)    el.className = 'tok' + (gen?' gen':'') + (n ? ' done-n' : ' done-c');
    else                  el.className = 'tok' + (gen?' gen':'');
  }
  // Avoid forcing scroll while animating; this iframe should never pull the parent viewport.
  syncFrameHeight();
}

// ── Animation loop ──
const STEP_MS = 204;   // ms per token step — smooth and readable
let animId = null, lastTs = 0, playing = false;

function tick(ts) {
  if (ts - lastTs >= STEP_MS) {
    step++;
    if (step >= T) {
      step = 0;
      lastTs = ts;
      render();
      animId = requestAnimationFrame(tick);
      return;
    }
    render();
    lastTs = ts;
  }
  animId = requestAnimationFrame(tick);
}

function startAnim() {
  if (!playing) {
    playing = true;
    lastTs = 0;
    animId = requestAnimationFrame(tick);
    document.getElementById('play-btn').textContent = '⏸ Pause';
  }
}
function stopAnim() {
  if (playing) {
    playing = false;
    cancelAnimationFrame(animId);
    animId = null;
    syncFrameHeight(true);
    document.getElementById('play-btn').textContent = '▶ Play';
  }
}

document.getElementById('play-btn').addEventListener('click', function() {
  if (playing) stopAnim(); else startAnim();
});

// Show first frame paused
render();

if (typeof ResizeObserver !== 'undefined') {
  const ro = new ResizeObserver(syncFrameHeight);
  if (document.body) ro.observe(document.body);
}

window.addEventListener('load', function() {
  syncFrameHeight(true);
  [100, 300, 700, 1200].forEach(function(ms) { setTimeout(function() { syncFrameHeight(true); }, ms); });
});

// ── Scroll forwarding: let the parent page scroll when the cursor is over this iframe ──
// Both pages are same-origin so window.parent access is allowed.
window.addEventListener('wheel', function(e) {
  try { window.parent.scrollBy(0, e.deltaY); } catch(_) {}
}, {passive: true});

/// Touch: forward vertical swipes so mobile users can scroll past
let _lastTY = 0;
window.addEventListener('touchstart', function(e) {
  _lastTY = e.touches[0].clientY;
}, {passive: true});
window.addEventListener('touchmove', function(e) {
  const dy = _lastTY - e.touches[0].clientY;
  _lastTY = e.touches[0].clientY;
  try { window.parent.scrollBy(0, dy); } catch(_) {}
}, {passive: true});

</script>
